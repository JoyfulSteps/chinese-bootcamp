<!-- в•җв•җв•җв•җ GRAMMAR CARD вҖ” Mбә¶T SAU в•җв•җв•җв•җ -->
<div class="gc-header">
  <div class="gc-badges">
    <span class="gc-badge-week">{{Week}}</span>
    <span class="gc-badge-day">{{Day}}</span>
  </div>
  <span class="gc-tags-small">{{Tags}}</span>
</div>

<!-- в”Җв”Җ Answer Hero в”Җв”Җ -->
<div class="gc-answer-hero">
  <div class="gc-answer-name">{{GrammarName}}</div>
  <div class="gc-answer-meaning" id="answerMeaning">{{GrammarMeaning}}</div>
  <div class="gc-pattern-row">
    <span class="gc-pattern-label">Pattern:</span>
    <span class="gc-pattern-value" id="answerPattern">{{Pattern}}</span>
  </div>
</div>

<!-- в”Җв”Җ VГӯ dб»Ҙ в”Җв”Җ -->
<div class="gc-section" id="secExamples">
  <div class="gc-section-title">рҹ“– VГӯ dб»Ҙ</div>
  <div class="gc-examples-body" id="examplesBody"></div>
</div>

<!-- в”Җв”Җ LЖ°u ГҪ в”Җв”Җ -->
<div class="gc-section" id="secNotes" style="display:none">
  <div class="gc-section-title">вҡ пёҸ LЖ°u ГҪ</div>
  <div class="gc-notes-body" id="notesBody"></div>
</div>

<!-- в”Җв”Җ Dev Tip в”Җв”Җ -->
<div class="gc-section gc-section-tip" id="secTip" style="display:none">
  <div class="gc-section-title">рҹ’Ў Dev Tip</div>
  <div class="gc-tip-body" id="tipBody"></div>
</div>

<!-- в”Җв”Җ BГ i tбәӯp в”Җв”Җ -->
<div class="gc-section" id="secExercise" style="display:none">
  <div class="gc-section-title">рҹҸӢпёҸ BГ i tбәӯp</div>
  <div class="gc-exercise-body" id="exerciseBody"></div>
</div>

<!-- в”Җв”Җ Source в”Җв”Җ -->
<div class="gc-source">рҹ“Ӯ {{SourceFile}}</div>

<!-- Hidden raw data -->
<span id="d-examples"  style="display:none">{{Examples}}</span>
<span id="d-notes"     style="display:none">{{Notes}}</span>
<span id="d-tip"       style="display:none">{{DevTip}}</span>
<span id="d-exercise"  style="display:none">{{Exercise}}</span>

<script>
(function(){

  /* в”Җв”Җ helpers в”Җв”Җ */
  function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  function getText(id){ return (document.getElementById(id)||{}).textContent||''; }
  function show(id){ var el=document.getElementById(id); if(el) el.style.display=''; }

  var examples = getText('d-examples').trim();
  var notes    = getText('d-notes').trim();
  var tip      = getText('d-tip').trim();
  var exercise = getText('d-exercise').trim();

  /* в•җв•җв•җв•җ Render Examples в•җв•җв•җв•җ */
  (function(){
    var el = document.getElementById('examplesBody');
    if (!el || !examples) return;

    var groups = examples.split(/\n---\n|\n---$/m);
    var html = '';

    groups.forEach(function(group, gi){
      if (!group.trim()) return;
      var lines = group.trim().split('\n');
      if (gi > 0) html += '<div class="gc-group-sep"></div>';

      lines.forEach(function(line){
        line = line.trim();
        if (!line) return;
        var hasCN   = /[\u4e00-\u9fff]/.test(line);
        var isWarn  = /^[вҡ пёҸвң…вқҢ]/.test(line);

        if (isWarn) {
          var cls = line.startsWith('вң…') ? 'gc-ex-ok' : line.startsWith('вқҢ') ? 'gc-ex-bad' : 'gc-ex-warn';
          html += '<div class="gc-ex-note ' + cls + '">' + esc(line) + '</div>';

        } else if (hasCN) {
          // TГЎch theo 2+ spaces hoбә·c tab: [ZH]  [Pinyin]  [NghД©a]
          var parts = line.split(/\t|\s{2,}/);
          if (parts.length >= 2) {
            html += '<div class="gc-ex-row">';
            html += '<span class="gc-ex-zh">'  + esc(parts[0]) + '</span>';
            for (var i = 1; i < parts.length; i++) {
              var p = parts[i].trim();
              if (!p) continue;
              // Detect pinyin (no Chinese chars, has latin + tone marks)
              var isPy = /^[a-zA-ZДҒГЎЗҺГ Д“Г©ДӣГЁД«ГӯЗҗГ¬ЕҚГіЗ’ГІЕ«ГәЗ”Г№З–ЗҳЗҡЗң\s.,!?]+$/.test(p);
              html += '<span class="' + (isPy ? 'gc-ex-py' : 'gc-ex-vn') + '">' + esc(p) + '</span>';
            }
            html += '</div>';
          } else {
            html += '<div class="gc-ex-single">' + esc(line) + '</div>';
          }

        } else {
          html += '<div class="gc-ex-plain">' + esc(line) + '</div>';
        }
      });
    });

    el.innerHTML = html || '<div class="gc-empty">KhГҙng cГі vГӯ dб»Ҙ.</div>';
  })();

  /* в•җв•җв•җв•җ Render Notes в•җв•җв•җв•җ */
  (function(){
    if (!notes) return;
    show('secNotes');
    var el = document.getElementById('notesBody');
    if (!el) return;
    var html = '';
    notes.split('\n').forEach(function(line){
      line = line.trim();
      if (!line) return;
      var cls = 'gc-note-line';
      if (/^вҡ пёҸ/.test(line)) cls += ' gc-note-warn';
      else if (/^вң…/.test(line)) cls += ' gc-note-ok';
      else if (/^вқҢ/.test(line)) cls += ' gc-note-bad';
      else if (/^\|/.test(line)) cls += ' gc-note-code';
      html += '<div class="' + cls + '">' + esc(line) + '</div>';
    });
    el.innerHTML = html;
  })();

  /* в•җв•җв•җв•җ Render Dev Tip в•җв•җв•җв•җ */
  (function(){
    if (!tip) return;
    show('secTip');
    var el = document.getElementById('tipBody');
    if (!el) return;
    // Highlight `code` spans
    el.innerHTML = esc(tip).replace(/`([^`]+)`/g,
      '<code class="gc-inline-code">$1</code>');
  })();

  /* в•җв•җв•җв•җ Render Exercise в•җв•җв•җв•җ */
  (function(){
    if (!exercise) return;
    show('secExercise');
    var el = document.getElementById('exerciseBody');
    if (!el) return;
    // Strip ``` fences
    var cleaned = exercise.replace(/^```[^\n]*\n?/, '').replace(/\n?```$/, '');
    var html = '';
    cleaned.split('\n').forEach(function(line){
      line = line.trim();
      if (!line) return;
      if (line === '[ДҗГЎp ГЎn бә©n]' || line === '---') {
        html += '<div class="gc-ans-note">рҹ’¬ ДҗГЎp ГЎn: xem bГ i hб»Қc gб»‘c</div>';
      } else if (/^\d+[.)]\s/.test(line)) {
        html += '<div class="gc-ex-q">  ' + esc(line) + '</div>';
      } else {
        html += '<div class="gc-ex-plain">' + esc(line) + '</div>';
      }
    });
    el.innerHTML = html;
  })();

})();
</script>
