<!-- ════════ PINYIN PHONETICS — MẶT SAU ════════ -->
<div class="ph-header">
    <span class="badge">{{Type}}</span>
    <span class="stars">{{Difficulty}}</span>
</div>

<div class="ph-back">
    <div class="ph-hero">
        <div class="big">{{Pinyin}}</div>
        <div class="sub">{{IPA}} · {{Category}}</div>
    </div>

    {{#Teacher_Note}}
    <div class="ph-teacher">
        <b>🎤 Cô VU HÀ:</b> "{{Teacher_Note}}"
    </div>
    {{/Teacher_Note}}

    {{#Video_Clip}}
    <div class="ph-video">
        {{Video_Clip}}
        <div class="ph-video-label">🎬 Video hướng dẫn phát âm</div>
    </div>
    {{/Video_Clip}}

    {{#Pronunciation_Guide}}
    <div class="ph-sec s-accent">
        <div class="ph-sec-head">📖 HƯỚNG DẪN PHÁT ÂM</div>
        <div class="ph-sec-body">{{Pronunciation_Guide}}</div>
    </div>
    {{/Pronunciation_Guide}}
</div>
